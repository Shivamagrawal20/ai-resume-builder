# Frontend only — API runs elsewhere. Required: VITE_API_URL = your API origin (https://…, no trailing slash), same for Production + Deploy previews you use.
# Build also writes dist/_redirects to proxy /api/* for public HTML pages.

[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
